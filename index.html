<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bosco3D</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f1a14;
  color:white;
}

header{
  text-align:center;
  padding:18px;
  font-size:26px;
  font-weight:bold;
}

.screen{padding:15px;}

button{
  width:100%;
  padding:14px;
  margin:8px 0;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#1f3a2b;
  color:white;
}

button:active{transform:scale(0.98);}

.hidden{display:none;}

.card{
  background:#15261d;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.score-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.score-grid button{
  font-size:22px;
  padding:22px;
}

.score-11{background:#d4af37;}
.score-10{background:#c0392b;}
.score-8{background:#2980b9;}
.score-5{background:#7f8c8d;}
.score-m{background:#2c3e50;}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.small{font-size:13px; opacity:0.8;}
</style>
</head>

<body>

<header>🌲 Bosco3D</header>

<!-- HOME -->
<div id="home" class="screen">
  <button onclick="showSetup()">▶ Nuovo allenamento</button>
  <button onclick="showHistory()">📜 Storico</button>
  <button onclick="showStats()">📊 Statistiche</button>
</div>

<!-- SETUP -->
<div id="setup" class="screen hidden">
  <div class="card">
    <h3>Scegli bersagli</h3>
    <button onclick="start(24)">24 bersagli</button>
    <button onclick="start(28)">28 bersagli</button>
    <button onclick="start(40)">40 bersagli</button>
  </div>
</div>

<!-- TRAINING -->
<div id="training" class="screen hidden">

  <div class="topbar">
    <div id="target">Bersaglio 1</div>
    <div id="total">Tot: 0</div>
  </div>

  <div class="card">
    <div id="shotInfo" class="small">Frecce: 1 / 2</div>

    <div class="score-grid">
      <button class="score-11" onclick="addScore(11)">11</button>
      <button class="score-10" onclick="addScore(10)">10</button>
      <button class="score-8" onclick="addScore(8)">8</button>
      <button class="score-5" onclick="addScore(5)">5</button>
      <button class="score-m" onclick="addScore(0)">M</button>
    </div>

    <button onclick="undo()">↩ Annulla ultimo colpo</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen hidden">
  <div class="card">
    <h3>Allenamento terminato</h3>
    <div id="summary"></div>
    <button onclick="goHome()">Home</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="screen hidden">
  <h3>Storico</h3>
  <div id="historyList"></div>
  <button onclick="goHome()">Home</button>
</div>

<!-- STATS -->
<div id="stats" class="screen hidden">
  <h3>Statistiche</h3>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card" id="statsText"></div>

  <button onclick="goHome()">Home</button>
</div>

<script>
let targets=0;
let current=1;

let total=0;
let history=[];
let scores=[];

let shotInTarget=1; // 👈 2 frecce per bersaglio

let chart=null;

/* ---------------- HOME ---------------- */
function showSetup(){
  switchScreen("setup");
}

/* ---------------- START ---------------- */
function start(n){
  targets=n;
  current=1;
  total=0;
  history=[];
  scores=[];
  shotInTarget=1;

  switchScreen("training");
  updateUI();
}

/* ---------------- SCORE ---------------- */
function addScore(val){

  history.push({
    target: current,
    shot: shotInTarget,
    value: val
  });

  scores.push(val);
  total += val;

  // gestione 2 frecce
  if(shotInTarget === 1){
    shotInTarget = 2;
  } else {
    shotInTarget = 1;
    current++;
  }

  if(current > targets){
    endTraining();
    return;
  }

  updateUI();
}

/* ---------------- UNDO ---------------- */
function undo(){
  if(history.length === 0) return;

  let last = history.pop();
  scores.pop();

  total -= last.value;

  current = last.target;
  shotInTarget = last.shot;

  updateUI();
}

/* ---------------- UI ---------------- */
function updateUI(){
  document.getElementById("target").innerText =
    "Bersaglio " + current + " / " + targets;

  document.getElementById("total").innerText =
    "Tot: " + total;

  document.getElementById("shotInfo").innerText =
    "Frecce: " + shotInTarget + " / 2";
}

/* ---------------- END ---------------- */
function endTraining(){
  saveTraining();

  let c={11:0,10:0,8:0,5:0,M:0};

  scores.forEach(s=>{
    if(s===11)c[11]++;
    else if(s===10)c[10]++;
    else if(s===8)c[8]++;
    else if(s===5)c[5]++;
    else c.M++;
  });

  document.getElementById("summary").innerHTML=`
    <p>Totale: <b>${total}</b></p>
    <p>11:${c[11]} 10:${c[10]} 8:${c[8]} 5:${c[5]} M:${c.M}</p>
  `;

  switchScreen("end");
}

/* ---------------- STORAGE ---------------- */
function saveTraining(){
  let data=JSON.parse(localStorage.getItem("bosco3d")||"[]");

  data.push({
    date:new Date().toISOString(),
    total,
    targets,
    arrows:scores.length,
    scores
  });

  localStorage.setItem("bosco3d",JSON.stringify(data));
}

/* ---------------- HISTORY ---------------- */
function showHistory(){
  let data=JSON.parse(localStorage.getItem("bosco3d")||"[]");

  document.getElementById("historyList").innerHTML=
    data.map((t,i)=>`
      <div class="card">
        <b>#${i+1}</b><br>
        Punti:${t.total}<br>
        Frecce:${t.arrows}<br>
        Bersagli:${t.targets}<br>
      </div>
    `).join("") || "<p>Nessun dato</p>";

  switchScreen("history");
}

/* ---------------- STATS ---------------- */
function showStats(){
  let data=JSON.parse(localStorage.getItem("bosco3d")||"[]");

  if(data.length===0){
    switchScreen("stats");
    document.getElementById("statsText").innerHTML="Nessun dato";
    return;
  }

  let totals=data.map(d=>d.total);
  let avg=totals.reduce((a,b)=>a+b,0)/totals.length;

  let best=Math.max(...totals);
  let worst=Math.min(...totals);

  let arrows=data.reduce((a,b)=>a+b.arrows,0);

  let c={11:0,10:0,8:0,5:0,M:0};

  data.forEach(d=>{
    d.scores.forEach(s=>{
      if(s===11)c[11]++;
      else if(s===10)c[10]++;
      else if(s===8)c[8]++;
      else if(s===5)c[5]++;
      else c.M++;
    });
  });

  let ctx=document.getElementById("chart").getContext("2d");

  if(chart)chart.destroy();

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:data.map((_,i)=>i+1),
      datasets:[{
        label:"Punteggio",
        data:totals,
        borderColor:"#4caf50",
        fill:false
      }]
    }
  });

  document.getElementById("statsText").innerHTML=`
    <p>Allenamenti:${data.length}</p>
    <p>Media:${avg.toFixed(1)}</p>
    <p>Best:${best} Worst:${worst}</p>
    <p>Frecce:${arrows}</p>
    <hr>
    <p>11:${c[11]} 10:${c[10]} 8:${c[8]} 5:${c[5]} M:${c.M}</p>
  `;

  switchScreen("stats");
}

/* ---------------- NAV ---------------- */
function goHome(){
  switchScreen("home");
}

function switchScreen(id){
  ["home","setup","training","end","history","stats"]
  .forEach(s=>document.getElementById(s).classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
