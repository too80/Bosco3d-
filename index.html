<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bosco3D Lite</title><meta name="theme-color" content="#f7f5ef"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg"><link rel="stylesheet" href="style.css"></head><body><main id="app"><section id="home" class="screen active"><img class="club-logo" src="logo-compagnia.jpg" alt="Arcieri Telemachos"><h1>Bosco3D Lite</h1><p class="subtitle">Segnapunti per percorsi 3D</p><div class="home-actions"><button id="btnNew" class="primary">🏹 <strong>Nuovo allenamento</strong><small>Inizia un nuovo percorso</small></button><button id="btnResume" class="secondary hidden">▶ <strong>Riprendi allenamento</strong><small>Continua quello in corso</small></button></div><button id="btnHistory" class="history-entry">📋 Storico allenamenti<small>Visualizza i risultati salvati</small></button></section><section id="training" class="screen"><div class="training-card"><div><span class="label">Bersaglio</span><strong id="targetNumber">1 / 24</strong></div><div><span class="label">Freccia</span><strong id="arrowNumber">1 / 2</strong></div><div><span class="label">Totale</span><strong id="total">0</strong></div></div><div class="score-panel"><h2>Segna punteggio</h2><div class="score-buttons"><button class="score" data-score="11">11</button><button class="score" data-score="10">10</button><button class="score" data-score="8">8</button><button class="score" data-score="5">5</button><button class="score miss" data-score="0">M</button></div><div class="training-actions"><button id="btnUndo" class="soft">↩ Annulla ultimo colpo</button><button id="btnCancel" class="danger-soft">✕ Annulla allenamento</button></div></div></section><section id="summary" class="screen"><img class="club-logo small-logo" src="logo-compagnia.jpg" alt="Arcieri Telemachos"><h2>Allenamento terminato</h2><p id="summaryDate" class="subtitle"></p><div id="finalTotal" class="final-total">0</div><div id="summaryStats" class="summary-stats"></div><button id="btnSaveResult" class="primary">💾 Salva risultato</button><button id="btnAgain" class="secondary">🏹 Nuovo allenamento</button><button id="btnHome" class="soft">🏠 Home</button></section><section id="history" class="screen"><h2>Storico allenamenti</h2><div id="historyList" class="history-list"></div><button id="btnClearHistory" class="danger-soft">🗑 Cancella storico</button><button id="btnHistoryHome" class="soft">🏠 Home</button></section></main><script src="app.js"></script></body></html>
